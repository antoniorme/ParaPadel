
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Mobile Web App Settings -->
    <meta name="theme-color" content="#f8fafc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ParaPadel" />
    <meta name="format-detection" content="telephone=no" />

    <title>ParaPadel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@1,9..40,900&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700;1,900&family=Barlow+Semi+Condensed:ital,wght@1,700;1,900&display=swap" rel="stylesheet">
    <style>
      /* Light Mode Background */
      body {
        font-family: 'Barlow', sans-serif;
        background-color: #f8fafc;
        color: #0f172a;
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
        width: 100%;
      }

      /* DM Sans para el logo (h1 italic en Landing) */
      h1.italic {
        font-family: 'DM Sans', sans-serif;
      }

      /* Botones — baseline global de legibilidad */
      button { min-height: 36px; }
      button:not([class*="p-"]):not([class*="py-"]) { padding-top: 0.5rem; padding-bottom: 0.5rem; }

      /* Barlow Semi Condensed Italic para headers de sección (h2, h3) */
      h2.font-black, h3.font-black {
        font-family: 'Barlow Semi Condensed', sans-serif;
        font-style: italic;
      }
      
      /* Mejorar scroll en móvil */
      html, body {
        overscroll-behavior-y: none;
      }

      /* Utilitarios de animación simple */
      .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
      @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      
      .animate-slide-left { animation: slideLeft 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
      @keyframes slideLeft { from { transform: translateX(100%); } to { transform: translateX(0); } }

      .animate-fade-in { animation: fadeIn 0.2s ease-out; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      
      /* Ocultar barra de scroll pero permitir scroll */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* Ajuste para iOS Notch/Dynamic Island */
      .safe-pb { padding-bottom: env(safe-area-inset-bottom); }

      /* Alias: scrollbar-hide = no-scrollbar */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* Modal / card scale-in animation */
      .animate-scale-in { animation: scaleIn 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
      @keyframes scaleIn { from { transform: scale(0.93); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",

    "vite": "https://esm.sh/vite@^7.2.7",

    "react-router-dom": "https://esm.sh/react-router-dom@^7.10.1",
    "lucide-react": "https://esm.sh/lucide-react@^0.560.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.87.1",
    "@hcaptcha/react-hcaptcha": "https://esm.sh/@hcaptcha/react-hcaptcha@^1.17.1",
    "react-google-recaptcha": "https://esm.sh/react-google-recaptcha@^3.1.0"
  }
}
</script>
</head>
